<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Soil Data | Crop Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="page-card">
            <div class="page-header">
                <div>
                    <h1>Enter Your Soil Values</h1>
                    <p>Fill in the seven soil properties and get a crop recommendation created for your conditions.</p>
                </div>
                <a href="/" class="secondary-button">Home</a>
            </div>
            <div class="section-content">
                <div class="form-panel">
                    <form action="/form" method="post">
                        <label for="Nitrogen">Nitrogen (N)</label>
                        <input type="number" id="Nitrogen" name="Nitrogen" placeholder="e.g. 20" step="any" required>
                        
                        <label for="Phosphorus">Phosphorus (P)</label>
                        <input type="number" id="Phosphorus" name="Phosphorus" placeholder="e.g. 30" step="any" required>
                        
                        <label for="Potassium">Potassium (K)</label>
                        <input type="number" id="Potassium" name="Potassium" placeholder="e.g. 40" step="any" required>
                        
                        <label for="Temperature">Temperature (°C)</label>
                        <input type="number" id="Temperature" name="Temperature" placeholder="e.g. 25" step="any" required>
                        
                        <label for="Humidity">Humidity (%)</label>
                        <input type="number" id="Humidity" name="Humidity" placeholder="e.g. 80" step="any" required>

                        <label for="ph">Soil pH</label>
                        <input type="number" id="ph" name="ph" placeholder="e.g. 6.5" step="any" required>

                        <label for="Rainfall">Rainfall (mm)</label>
                        <input type="number" id="Rainfall" name="Rainfall" placeholder="e.g. 200" step="any" required>

                        <button type="submit">Predict Your Crop</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
